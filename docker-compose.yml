services:
  cysca-mock:
    build:
      context: .
      dockerfile: Dockerfile
    user: "997:984"
    environment:
      GAUGE_PYTHON_COMMAND: /app/.venv/bin/python
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - .:/workspace
      - ./reports:/workspace/reports
      - ./logs:/workspace/logs
