services:
  cysca-mock:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    environment:
      GAUGE_PYTHON_COMMAND: /app/.venv/bin/python
      PYTHONPATH: /workspace
    volumes:
      - .:/workspace
      - ./reports:/workspace/reports
      - ./logs:/workspace/logs
    command: sh -c "exec gauge run specs --env docker"
